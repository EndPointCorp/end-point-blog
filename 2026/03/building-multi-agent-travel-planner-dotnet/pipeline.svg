<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 1100" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="userBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="700" height="1100" fill="url(#bg)"/>

  <text x="350" y="50" text-anchor="middle" font-size="24" font-weight="700" fill="#1e293b">Multi-Agent Travel Planner Pipeline</text>
  <text x="350" y="78" text-anchor="middle" font-size="14" fill="#64748b">Sequential workflow powered by Microsoft Agent Framework</text>

  <!-- User Request -->
  <g filter="url(#shadow)">
    <rect x="225" y="110" width="250" height="100" rx="12" fill="url(#userBox)"/>
    <text x="350" y="150" text-anchor="middle" font-size="16" font-weight="600" fill="white">User Request</text>
    <text x="350" y="175" text-anchor="middle" font-size="12" fill="white" opacity="0.9">Natural-language travel query</text>
  </g>
  <line x1="350" y1="210" x2="350" y2="245" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Researcher -->
  <g filter="url(#shadow)">
    <rect x="225" y="250" width="250" height="100" rx="12" fill="url(#agentBox)"/>
    <text x="350" y="285" text-anchor="middle" font-size="16" font-weight="700" fill="white">Researcher</text>
    <text x="350" y="310" text-anchor="middle" font-size="12" fill="white" opacity="0.9">Weather, hotels, attractions, transport</text>
    <text x="350" y="330" text-anchor="middle" font-size="11" fill="white" opacity="0.75">Live APIs (Nominatim, OSRM, ...)</text>
  </g>
  <line x1="350" y1="350" x2="350" y2="385" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Planner -->
  <g filter="url(#shadow)">
    <rect x="225" y="390" width="250" height="100" rx="12" fill="url(#agentBox)"/>
    <text x="350" y="425" text-anchor="middle" font-size="16" font-weight="700" fill="white">Planner</text>
    <text x="350" y="450" text-anchor="middle" font-size="12" fill="white" opacity="0.9">Day-by-day itinerary</text>
    <text x="350" y="470" text-anchor="middle" font-size="11" fill="white" opacity="0.75">Synthesis from research</text>
  </g>
  <line x1="350" y1="490" x2="350" y2="525" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Accountant -->
  <g filter="url(#shadow)">
    <rect x="225" y="530" width="250" height="100" rx="12" fill="url(#agentBox)"/>
    <text x="350" y="565" text-anchor="middle" font-size="16" font-weight="700" fill="white">Accountant</text>
    <text x="350" y="590" text-anchor="middle" font-size="12" fill="white" opacity="0.9">Budget calculation &amp; validation</text>
    <text x="350" y="610" text-anchor="middle" font-size="11" fill="white" opacity="0.75">27 currencies, deterministic tools</text>
  </g>
  <line x1="350" y1="630" x2="350" y2="665" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Auditor -->
  <g filter="url(#shadow)">
    <rect x="225" y="670" width="250" height="100" rx="12" fill="url(#agentBox)"/>
    <text x="350" y="705" text-anchor="middle" font-size="16" font-weight="700" fill="white">Auditor</text>
    <text x="350" y="730" text-anchor="middle" font-size="12" fill="white" opacity="0.9">6-criteria validation</text>
    <text x="350" y="750" text-anchor="middle" font-size="11" fill="white" opacity="0.75">Math, safety, groundedness</text>
  </g>
  <line x1="350" y1="770" x2="350" y2="805" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Aggregator -->
  <g filter="url(#shadow)">
    <rect x="225" y="810" width="250" height="100" rx="12" fill="url(#agentBox)"/>
    <text x="350" y="845" text-anchor="middle" font-size="16" font-weight="700" fill="white">Aggregator</text>
    <text x="350" y="870" text-anchor="middle" font-size="12" fill="white" opacity="0.9">Final polished output</text>
    <text x="350" y="890" text-anchor="middle" font-size="11" fill="white" opacity="0.75">Markdown presentation</text>
  </g>
  <line x1="350" y1="910" x2="350" y2="945" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <g filter="url(#shadow)">
    <rect x="225" y="950" width="250" height="100" rx="12" fill="url(#userBox)"/>
    <text x="350" y="990" text-anchor="middle" font-size="16" font-weight="600" fill="white">Travel Plan</text>
    <text x="350" y="1015" text-anchor="middle" font-size="12" fill="white" opacity="0.9">Streamed to the browser via SSE</text>
  </g>
</svg>
